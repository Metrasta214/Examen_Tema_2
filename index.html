<!doctype html>
<html lang="es">
  <head>
    <title>three.js - Octree Collisions (Warehouse)</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <link type="text/css" rel="stylesheet" href="main.css" />
    <link
      rel="icon"
      type="image/png"
      href="./assets/favicon.png"
      sizes="32x32"
    />
  </head>
  <body>
    <nav id="navbar">
      <h3>ThreeJS Demo</h3>
      <ul>
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Acerca</a></li>
        <li><a href="#">Contacto</a></li>
      </ul>
    </nav>
    <div id="info">
      Octree three.js demo - colisiones con modelo estático<br />
      MOUSE para mirar • WASD para mover • SPACE para saltar • Click para lanzar
      bolas
    </div>
    <div id="container"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "./build/three.module.js",
          "three/addons/": "./jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import Stats from "three/addons/libs/stats.module.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { Octree } from "three/addons/math/Octree.js";
      import { OctreeHelper } from "three/addons/helpers/OctreeHelper.js";
      import { Capsule } from "three/addons/math/Capsule.js";

      // ================== CONFIGURACIÓN BASE ==================
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x88ccee);
      scene.fog = new THREE.Fog(0x88ccee, 0, 50);

      const camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.rotation.order = "YXZ";

      const fillLight1 = new THREE.HemisphereLight(0x8dc1de, 0x00668d, 1.5);
      fillLight1.position.set(2, 1, 1);
      scene.add(fillLight1);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 2.5);
      directionalLight.position.set(-5, 25, -1);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.width = 1024;
      directionalLight.shadow.mapSize.height = 1024;
      scene.add(directionalLight);

      const container = document.getElementById("container");
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.VSMShadowMap;
      container.appendChild(renderer.domElement);

      const stats = new Stats();
      stats.domElement.style.position = "absolute";
      stats.domElement.style.top = "0px";
      container.appendChild(stats.domElement);

      // ================== VARIABLES GLOBALES ==================
      const GRAVITY = 30;
      const NUM_SPHERES = 100;
      const SPHERE_RADIUS = 0.2;
      const STEPS_PER_FRAME = 5;

      let worldBounds = null;
      const worldOctree = new Octree();
      const usedPositions = [];

      const playerCollider = new Capsule(
        new THREE.Vector3(0, 0.5, 0),
        new THREE.Vector3(0, 3.5, 0),
        0.5,
      );

      const playerVelocity = new THREE.Vector3();
      const playerDirection = new THREE.Vector3();
      let playerOnFloor = false;
      let mouseTime = 0;

      const keyStates = {};
      const vector1 = new THREE.Vector3();
      const vector2 = new THREE.Vector3();
      const vector3 = new THREE.Vector3();

      // ================== ESFERAS ==================
      const sphereGeometry = new THREE.IcosahedronGeometry(SPHERE_RADIUS, 5);
      const sphereMaterial = new THREE.MeshLambertMaterial({ color: 0xdede8d });
      const spheres = [];
      let sphereIdx = 0;

      for (let i = 0; i < NUM_SPHERES; i++) {
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        sphere.castShadow = true;
        sphere.receiveShadow = true;
        scene.add(sphere);
        spheres.push({
          mesh: sphere,
          collider: new THREE.Sphere(
            new THREE.Vector3(0, -100, 0),
            SPHERE_RADIUS,
          ),
          velocity: new THREE.Vector3(),
        });
      }

      // ================== CONTROLES Y EVENTOS ==================
      document.addEventListener("keydown", (e) => (keyStates[e.code] = true));
      document.addEventListener("keyup", (e) => (keyStates[e.code] = false));

      container.addEventListener("mousedown", () => {
        document.body.requestPointerLock();
        mouseTime = performance.now();
      });

      document.addEventListener("mouseup", () => {
        if (document.pointerLockElement) throwBall();
      });

      document.addEventListener("mousemove", (e) => {
        if (document.pointerLockElement === document.body) {
          camera.rotation.y -= e.movementX / 500;
          camera.rotation.x -= e.movementY / 500;
          camera.rotation.x = Math.max(
            -Math.PI / 2,
            Math.min(Math.PI / 2, camera.rotation.x),
          );
        }
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ================== LÓGICA DE FÍSICAS ==================
      function throwBall() {
        const sphere = spheres[sphereIdx];
        camera.getWorldDirection(playerDirection);
        sphere.collider.center
          .copy(playerCollider.end)
          .addScaledVector(playerDirection, playerCollider.radius * 1.5);

        const impulse =
          15 + 30 * (1 - Math.exp((mouseTime - performance.now()) * 0.001));
        sphere.velocity
          .copy(playerDirection)
          .multiplyScalar(impulse)
          .addScaledVector(playerVelocity, 2);

        sphereIdx = (sphereIdx + 1) % spheres.length;
      }

      function playerCollisions() {
        const result = worldOctree.capsuleIntersect(playerCollider);
        playerOnFloor = false;

        if (result) {
          playerOnFloor = result.normal.y > 0;
          if (!playerOnFloor) {
            playerVelocity.addScaledVector(
              result.normal,
              -result.normal.dot(playerVelocity),
            );
          }
          if (result.depth >= 1e-10) {
            playerCollider.translate(
              result.normal.multiplyScalar(result.depth),
            );
          }
        }
      }

      function updatePlayer(deltaTime) {
        let damping = Math.exp(-4 * deltaTime) - 1;
        if (!playerOnFloor) {
          playerVelocity.y -= GRAVITY * deltaTime;
          damping *= 0.1;
        } else {
          playerVelocity.y = Math.max(0, playerVelocity.y);
        }
        playerVelocity.addScaledVector(playerVelocity, damping);

        playerCollider.translate(
          playerVelocity.clone().multiplyScalar(deltaTime),
        );
        playerCollisions();
        camera.position.copy(playerCollider.end);
      }

      function constrainPlayer() {
        if (!worldBounds) return;

        const padding = 0.2;
        const min = worldBounds.min;
        const max = worldBounds.max;

        playerCollider.start.x = Math.max(
          min.x + padding,
          Math.min(max.x - padding, playerCollider.start.x),
        );
        playerCollider.start.z = Math.max(
          min.z + padding,
          Math.min(max.z - padding, playerCollider.start.z),
        );
        playerCollider.end.x = Math.max(
          min.x + padding,
          Math.min(max.x - padding, playerCollider.end.x),
        );
        playerCollider.end.z = Math.max(
          min.z + padding,
          Math.min(max.z - padding, playerCollider.end.z),
        );

        // Evitar que caiga debajo del modelo
        if (worldBounds && playerCollider.start.y < worldBounds.min.y) {
          playerCollider.start.y = worldBounds.min.y + 0.2;
          playerCollider.end.y = playerCollider.start.y + 1;
          playerVelocity.y = 0;
        }
      }

      function playerSphereCollision(sphere) {
        const center = vector1
          .addVectors(playerCollider.start, playerCollider.end)
          .multiplyScalar(0.5);
        const r = playerCollider.radius + sphere.collider.radius;
        const r2 = r * r;

        for (const point of [
          playerCollider.start,
          playerCollider.end,
          center,
        ]) {
          const d2 = point.distanceToSquared(sphere.collider.center);
          if (d2 < r2) {
            const normal = vector1
              .subVectors(point, sphere.collider.center)
              .normalize();
            const v1 = vector2
              .copy(normal)
              .multiplyScalar(normal.dot(playerVelocity));
            const v2 = vector3
              .copy(normal)
              .multiplyScalar(normal.dot(sphere.velocity));

            playerVelocity.add(v2).sub(v1);
            sphere.velocity.add(v1).sub(v2);

            const d = (r - Math.sqrt(d2)) / 2;
            sphere.collider.center.addScaledVector(normal, -d);
          }
        }
      }

      function spheresCollisions() {
        for (let i = 0; i < spheres.length; i++) {
          for (let j = i + 1; j < spheres.length; j++) {
            const s1 = spheres[i],
              s2 = spheres[j];
            const d2 = s1.collider.center.distanceToSquared(s2.collider.center);
            const r2 = (s1.collider.radius + s2.collider.radius) ** 2;

            if (d2 < r2) {
              const normal = vector1
                .subVectors(s1.collider.center, s2.collider.center)
                .normalize();
              const v1 = vector2
                .copy(normal)
                .multiplyScalar(normal.dot(s1.velocity));
              const v2 = vector3
                .copy(normal)
                .multiplyScalar(normal.dot(s2.velocity));

              s1.velocity.add(v2).sub(v1);
              s2.velocity.add(v1).sub(v2);

              const d =
                (s1.collider.radius + s2.collider.radius - Math.sqrt(d2)) / 2;
              s1.collider.center.addScaledVector(normal, d);
              s2.collider.center.addScaledVector(normal, -d);
            }
          }
        }
      }

      function updateSpheres(deltaTime) {
        spheres.forEach((sphere) => {
          sphere.collider.center.addScaledVector(sphere.velocity, deltaTime);
          const result = worldOctree.sphereIntersect(sphere.collider);

          if (result) {
            sphere.velocity.addScaledVector(
              result.normal,
              -result.normal.dot(sphere.velocity) * 1.5,
            );
            sphere.collider.center.add(
              result.normal.multiplyScalar(result.depth),
            );
          } else {
            sphere.velocity.y -= GRAVITY * deltaTime;
          }

          sphere.velocity.addScaledVector(
            sphere.velocity,
            Math.exp(-1.5 * deltaTime) - 1,
          );
          playerSphereCollision(sphere);
        });

        spheresCollisions();
        spheres.forEach((s) => s.mesh.position.copy(s.collider.center));
      }

      // ================== CONTROLES DE JUGADOR ==================
      function getForwardVector() {
        camera.getWorldDirection(playerDirection);
        playerDirection.y = 0;
        playerDirection.normalize();
        return playerDirection;
      }

      function getSideVector() {
        camera.getWorldDirection(playerDirection);
        playerDirection.y = 0;
        playerDirection.normalize();
        playerDirection.cross(camera.up);
        return playerDirection;
      }

      function controls(deltaTime) {
        const speedDelta = deltaTime * (playerOnFloor ? 25 : 8);

        if (keyStates["KeyW"])
          playerVelocity.add(getForwardVector().multiplyScalar(speedDelta));
        if (keyStates["KeyS"])
          playerVelocity.add(getForwardVector().multiplyScalar(-speedDelta));
        if (keyStates["KeyA"])
          playerVelocity.add(getSideVector().multiplyScalar(-speedDelta));
        if (keyStates["KeyD"])
          playerVelocity.add(getSideVector().multiplyScalar(speedDelta));
        if (playerOnFloor && keyStates["Space"]) playerVelocity.y = 15;
      }

      function teleportPlayerIfOob() {
        if (camera.position.y < -10 && worldBounds) {
          const center = new THREE.Vector3();
          worldBounds.getCenter(center);
          const offset = 2;
          const spawnX = center.x;
          const spawnZ = worldBounds.max.z + offset;
          const spawnY = worldBounds.min.y + 0.3;

          playerCollider.start.set(spawnX, spawnY, spawnZ);
          playerCollider.end.set(spawnX, spawnY + 0.5, spawnZ);
          playerVelocity.set(0, 0, 0);
          camera.position.copy(playerCollider.end);
        }
      }

      // ================== FUNCIONES DE UBICACIÓN ==================
      function addPosition(x, z) {
        usedPositions.push({ x, z });
      }

      function clampToBounds(x, z, margin = 2) {
        const minX = worldBounds.min.x + margin;
        const maxX = worldBounds.max.x - margin;
        const minZ = worldBounds.min.z + margin;
        const maxZ = worldBounds.max.z - margin;

        return {
          x: Math.max(minX, Math.min(maxX, x)),
          z: Math.max(minZ, Math.min(maxZ, z)),
        };
      }

      function isFarEnough(x, z, minDist = 12) {
        return usedPositions.every((p) => {
          const dx = p.x - x;
          const dz = p.z - z;
          return dx * dx + dz * dz > minDist * minDist;
        });
      }

      function placeObject(object, x, z, scale = 1) {
        const pos = clampToBounds(x, z);
        object.scale.set(scale, scale, scale);
        object.updateMatrixWorld(true);

        const box = new THREE.Box3().setFromObject(object);
        const offsetY = box.min.y;

        object.position.set(pos.x, worldBounds.min.y - offsetY, pos.z);
        object.position.y -= 0.05;

        return pos;
      }

      // ================== CARGA DE MODELOS ==================
      const loader = new GLTFLoader().setPath("./models/gltf/");
      const loaderExtras = new GLTFLoader().setPath("./models/");

      loader.load(
        "abandoned_warehouse.glb",
        (gltf) => {
          console.log("MODELO CARGADO ✅");

          const model = gltf.scene;

          // ================== WAREHOUSE ==================
          model.position.set(0, 0, 0);
          model.scale.set(1, 1, 1);
          scene.add(model);

          model.updateWorldMatrix(true, true);

          // ================== OCTREE ==================
          worldOctree.fromGraphNode(model);

          // ================== BOUNDING ==================
          const box = new THREE.Box3().setFromObject(model);
          worldBounds = box;

          const center = new THREE.Vector3();
          box.getCenter(center);

          const size = new THREE.Vector3();
          box.getSize(size);

          // ================== PISO ==================
          const floor = new THREE.Mesh(
            new THREE.BoxGeometry(size.x, 0.2, size.z),
            new THREE.MeshBasicMaterial({ visible: false }),
          );

          floor.position.set(center.x, box.min.y + 0.1, center.z);
          scene.add(floor);
          worldOctree.fromGraphNode(floor);

          // ================== SPAWN ==================
          const spawnX = center.x;
          const spawnZ = box.max.z + 5;
          const spawnY = box.min.y + 0.5;

          playerCollider.start.set(spawnX, spawnY, spawnZ);
          playerCollider.end.set(spawnX, spawnY + 1.5, spawnZ);
          camera.position.copy(playerCollider.end);

          const spread = 25;

          // 🔥 FUNCIÓN CLAVE (REUBICACIÓN)
          function getValidPosition(x, z, minDist = 12, attempts = 15) {
            let newX = x;
            let newZ = z;

            for (let i = 0; i < attempts; i++) {
              if (isFarEnough(newX, newZ, minDist)) break;

              newX += (Math.random() - 0.5) * 15;
              newZ += (Math.random() - 0.5) * 15;
            }

            return { x: newX, z: newZ };
          }

          // ================== CARRO 1 ==================
          loaderExtras.load("car_scene.glb", (gltfCar) => {
            const car = gltfCar.scene;

            let x = center.x + spread * 0.8;
            let z = center.z - spread * 0.6;

            const valid = getValidPosition(x, z);

            const pos = placeObject(car, valid.x, valid.z, 0.02);
            addPosition(pos.x, pos.z);

            scene.add(car);
            worldOctree.fromGraphNode(car);
          });

          // ================== CARRO 2 ==================
          loaderExtras.load(
            "low_poly_car_-_chevrolet_c10_pickup_1963.glb",
            (gltfCar2) => {
              const car2 = gltfCar2.scene;

              let x = center.x - spread * 0.8;
              let z = center.z + spread * 0.6;

              const valid = getValidPosition(x, z);

              const pos = placeObject(car2, valid.x, valid.z, 0.02);
              addPosition(pos.x, pos.z);

              scene.add(car2);
              worldOctree.fromGraphNode(car2);
            },
          );

          // ================== SHED ==================
          loaderExtras.load("worn_shed_pbr_game-ready.glb", (gltfShed) => {
            const shed = gltfShed.scene;

            let x = center.x - spread;
            let z = center.z - spread;

            const valid = getValidPosition(x, z);

            const pos = placeObject(shed, valid.x, valid.z, 0.018);
            addPosition(pos.x, pos.z);

            scene.add(shed);
            worldOctree.fromGraphNode(shed);
          });

          // ================== ROCAS ==================
          loaderExtras.load("low_poly_rocks.glb", (gltfRocks) => {
            const rock = gltfRocks.scene;

            const rockPositions = [
              [10, 10],
              [-10, 15],
              [15, -10],
              [-15, -5],
              [20, 0],
            ];

            rockPositions.forEach((posArr) => {
              let x = center.x + posArr[0];
              let z = center.z + posArr[1];

              const valid = getValidPosition(x, z, 10);

              const r = rock.clone();

              const finalPos = placeObject(r, valid.x, valid.z, 4);
              addPosition(finalPos.x, finalPos.z);

              scene.add(r);
              worldOctree.fromGraphNode(r);
            });
          });

          // ================== ÁRBOLES ==================
          loaderExtras.load(
            "stylized_low_poly_tree_-_game-ready.glb",
            (gltfTree) => {
              const tree = gltfTree.scene;

              const treePositions = [
                [-20, -20],
                [20, -20],
                [-20, 20],
                [20, 20],
                [0, 25],
                [25, 0],
                [-25, 0],
              ];

              treePositions.forEach((posArr) => {
                let x = center.x + posArr[0];
                let z = center.z + posArr[1];

                const valid = getValidPosition(x, z, 15);

                const t = tree.clone();

                const finalPos = placeObject(t, valid.x, valid.z, 2.5); // 🔥 grandes
                addPosition(finalPos.x, finalPos.z);

                scene.add(t);
                worldOctree.fromGraphNode(t);
              });
            },
          );
        },
        undefined,
        (error) => console.error("ERROR AL CARGAR EL MODELO", error),
      );

      // ================== BUCLE DE ANIMACIÓN ==================
      function animate() {
        const deltaTime =
          Math.min(0.05, performance.now() / 1000 - (window.lastTime || 0)) /
          STEPS_PER_FRAME;
        window.lastTime = performance.now() / 1000;

        for (let i = 0; i < STEPS_PER_FRAME; i++) {
          controls(deltaTime);
          updatePlayer(deltaTime);
          constrainPlayer();
          updateSpheres(deltaTime);
          teleportPlayerIfOob();
        }

        renderer.render(scene, camera);
        stats.update();
      }

      renderer.setAnimationLoop(animate);
    </script>

    <footer id="footer">
      <p>© 2026 - Demo Three.js | Álvaro Madrid</p>
    </footer>
  </body>
</html>
