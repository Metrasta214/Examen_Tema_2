<!doctype html>
<html lang="es">
  <head>

    <meta charset="utf-8" />
    <meta

      content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <link type="text/css" rel="stylesheet" href="main.css" />
    <link

    />
  </head>
  <body>
    <nav id="navbar">

    <div id="info">
      MOUSE para mirar • WASD para mover • SPACE para saltar • CLICK para
      disparar • K para dañarse
    </div>

    <!-- HUD VIDA -->
    <div
      id="hud"
      style="
        position: absolute;
        bottom: 30px;
        left: 30px;
        z-index: 999;
        font-family: monospace;
        color: white;
        text-shadow: 1px 1px 3px black;
      "
    >
      <div style="margin-bottom: 6px; font-size: 14px">❤️ VIDA</div>
      <div
        style="
          width: 200px;
          height: 18px;
          background: #333;
          border-radius: 4px;
          overflow: hidden;
          border: 1px solid #555;
        "
      >
        <div
          id="health-bar"
          style="
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #e53935, #ef9a9a);
            transition: width 0.3s ease;
            border-radius: 4px;
          "
        ></div>
      </div>
      <div id="health-text" style="font-size: 12px; margin-top: 4px">
        100 / 100
      </div>
    </div>

    <!-- CROSSHAIR RE4 -->
    <div
      id="crosshair"
      style="
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 999;
      "
    >
      <svg width="24" height="24" viewBox="0 0 24 24">
        <line
          x1="12"
          y1="2"
          x2="12"
          y2="8"
          stroke="white"
          stroke-width="1.5"
          opacity="0.9"
        />
        <line
          x1="12"
          y1="16"
          x2="12"
          y2="22"
          stroke="white"
          stroke-width="1.5"
          opacity="0.9"
        />
        <line
          x1="2"
          y1="12"
          x2="8"
          y2="12"
          stroke="white"
          stroke-width="1.5"
          opacity="0.9"
        />
        <line
          x1="16"
          y1="12"
          x2="22"
          y2="12"
          stroke="white"
          stroke-width="1.5"
          opacity="0.9"
        />
        <circle cx="12" cy="12" r="1.5" fill="red" opacity="0.9" />
      </svg>
    </div>

    <!-- FLASH DE DISPARO -->
    <div
      id="muzzle-flash"
      style="
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 220, 80, 0.18);
        pointer-events: none;
        z-index: 998;
        opacity: 0;
        transition: opacity 0.04s;
      "
    ></div>

    <!-- HIT MARKER -->
    <div
      id="hit-marker"
      style="
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 1000;
        opacity: 0;
        font-size: 22px;
        color: #ff4444;
        font-weight: bold;
        text-shadow: 0 0 6px #000;
      "
    >
      ✕
    </div>

    <div id="container"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "./build/three.module.js",
          "three/addons/": "./jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import Stats from "three/addons/libs/stats.module.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { Octree } from "three/addons/math/Octree.js";
      import { OctreeHelper } from "three/addons/helpers/OctreeHelper.js";
      import { Capsule } from "three/addons/math/Capsule.js";

      // ================== CONFIGURACIÓN BASE ==================
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x88ccee);
      scene.fog = new THREE.Fog(0x88ccee, 0, 50);

      const camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.rotation.order = "YXZ";

      scene.add(new THREE.HemisphereLight(0x8dc1de, 0x00668d, 1.5));
      const directionalLight = new THREE.DirectionalLight(0xffffff, 2.5);
      directionalLight.position.set(-5, 25, -1);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.set(1024, 1024);
      scene.add(directionalLight);

      const container = document.getElementById("container");
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.VSMShadowMap;
      container.appendChild(renderer.domElement);

      const stats = new Stats();
      stats.domElement.style.position = "absolute";
      stats.domElement.style.top = "0px";
      container.appendChild(stats.domElement);

      // ================== VARIABLES GLOBALES ==================
      const GRAVITY = 30;
      const STEPS_PER_FRAME = 5;

      let worldBounds = null;
      const worldOctree = new Octree();
      const usedPositions = [];

      const playerCollider = new Capsule(
        new THREE.Vector3(0, 0.5, 0),
        new THREE.Vector3(0, 3.5, 0),
        0.5,
      );

      const playerVelocity = new THREE.Vector3();
      const playerDirection = new THREE.Vector3();
      let playerOnFloor = false;
      let mouseTime = 0;

      const keyStates = {};
      const vector1 = new THREE.Vector3();
      const vector2 = new THREE.Vector3();
      const vector3 = new THREE.Vector3();

      // ================== CÁMARA RE4 ==================
      let camYaw = 0;
      let camPitch = 0;

      // ================== SISTEMA DE VIDA ==================
      let playerHealth = 100;
      let isDead = false;

      const healthBar = document.getElementById("health-bar");
      const healthText = document.getElementById("health-text");

      function updateHealthUI() {
        const pct = Math.max(0, playerHealth);
        healthBar.style.width = pct + "%";
        healthText.textContent = pct + " / 100";
        if (pct > 50)
          healthBar.style.background = "linear-gradient(90deg,#e53935,#ef9a9a)";
        else if (pct > 25)
          healthBar.style.background = "linear-gradient(90deg,#f57c00,#ffcc80)";
        else
          healthBar.style.background = "linear-gradient(90deg,#b71c1c,#e53935)";
      }

      function damagePlayer(amount) {
        if (isDead) return;
        playerHealth = Math.max(0, playerHealth - amount);
        updateHealthUI();
        if (playerHealth <= 0) die();
      }

      function die() {
        isDead = true;
        playerVelocity.set(0, 0, 0);
        switchAnimation("dying");
        setTimeout(() => location.reload(), 3000);
      }

      // ================== SONIDO DE DISPARO (Web Audio API) ==================
      let audioCtx = null;

      function initAudio() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      function playGunshot() {
        if (!audioCtx) return;

        // disparo: ruido corto con envelope
        const bufferSize = audioCtx.sampleRate * 0.15;
        const buffer = audioCtx.createBuffer(
          1,
          bufferSize,
          audioCtx.sampleRate,
        );
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 4);
        }

        const source = audioCtx.createBufferSource();
        source.buffer = buffer;

        // filtro para que suene más a disparo y menos a ruido blanco
        const filter = audioCtx.createBiquadFilter();
        filter.type = "bandpass";
        filter.frequency.value = 180;
        filter.Q.value = 0.8;

        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(3.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(
          0.001,
          audioCtx.currentTime + 0.15,
        );

        source.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        source.start();
      }

      // ================== SISTEMA DE DISPARO (RAYCAST) ==================
      const raycaster = new THREE.Raycaster();
      const muzzleFlashEl = document.getElementById("muzzle-flash");
      const hitMarkerEl = document.getElementById("hit-marker");

      let flashTimeout = null;
      let hitTimeout = null;
      let canShoot = true;
      const SHOOT_COOLDOWN = 250; // ms entre disparos

      // líneas de impacto (trazadoras)
      const bulletLines = [];

      function shootRaycast() {
        if (!canShoot || isDead) return;
        canShoot = false;
        setTimeout(() => (canShoot = true), SHOOT_COOLDOWN);

        // sonido
        playGunshot();

        // flash de pantalla
        muzzleFlashEl.style.opacity = "1";
        clearTimeout(flashTimeout);
        flashTimeout = setTimeout(
          () => (muzzleFlashEl.style.opacity = "0"),
          60,
        );

        // flash en la boca del arma
        if (gunMesh) {
          gunMesh.children.forEach((c) => {
            if (c.isMuzzleFlash) c.visible = true;
          });
          setTimeout(() => {
            if (gunMesh)
              gunMesh.children.forEach((c) => {
                if (c.isMuzzleFlash) c.visible = false;
              });
          }, 60);
        }

        // raycast desde el centro de la pantalla
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        const hits = raycaster.intersectObjects(scene.children, true);

        // filtrar el propio personaje y arma
        const filtered = hits.filter((h) => {
          let obj = h.object;
          while (obj) {
            if (obj === playerModel || obj === gunMesh) return false;
            obj = obj.parent;
          }
          return true;
        });

        if (filtered.length > 0) {
          const hit = filtered[0];

          // hit marker
          hitMarkerEl.style.opacity = "1";
          clearTimeout(hitTimeout);
          hitTimeout = setTimeout(() => (hitMarkerEl.style.opacity = "0"), 120);

          // marca de impacto (decal simple)
          spawnImpactMark(hit.point, hit.face?.normal);

          // línea trazadora
          spawnBulletLine(
            gunMesh ? getGunTipPosition() : camera.position.clone(),
            hit.point,
          );
        } else {
          // disparo al aire — línea larga
          const far = raycaster.ray.origin
            .clone()
            .add(raycaster.ray.direction.clone().multiplyScalar(80));
          spawnBulletLine(
            gunMesh ? getGunTipPosition() : camera.position.clone(),
            far,
          );
        }
      }

      function getGunTipPosition() {
        const tip = new THREE.Vector3(0, 0, -0.35);
        gunMesh.localToWorld(tip);
        return tip;
      }

      function spawnImpactMark(point, normal) {
        const geo = new THREE.SphereGeometry(0.04, 4, 4);
        const mat = new THREE.MeshBasicMaterial({ color: 0x222222 });
        const mark = new THREE.Mesh(geo, mat);
        mark.position.copy(point);
        if (normal) mark.position.addScaledVector(normal, 0.02);
        scene.add(mark);
        setTimeout(() => {
          scene.remove(mark);
          geo.dispose();
          mat.dispose();
        }, 4000);
      }

      function spawnBulletLine(from, to) {
        const geo = new THREE.BufferGeometry().setFromPoints([from, to]);
        const mat = new THREE.LineBasicMaterial({
          color: 0xffee88,
          transparent: true,
          opacity: 0.6,
        });
        const line = new THREE.Line(geo, mat);
        scene.add(line);
        bulletLines.push({ line, born: performance.now() });
      }

      function updateBulletLines() {
        const now = performance.now();
        for (let i = bulletLines.length - 1; i >= 0; i--) {
          const { line, born } = bulletLines[i];
          const age = now - born;
          if (age > 80) {
            scene.remove(line);
            line.geometry.dispose();
            line.material.dispose();
            bulletLines.splice(i, 1);
          } else {
            line.material.opacity = 0.6 * (1 - age / 80);
          }
        }
      }

      // ================== ARMA GEOMÉTRICA ==================
      let gunMesh = null;

      function createGun() {
        const gunGroup = new THREE.Group();

        // cuerpo principal de la pistola
        const bodyGeo = new THREE.BoxGeometry(0.06, 0.12, 0.32);
        const bodyMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        gunGroup.add(body);

        // cañón
        const barrelGeo = new THREE.CylinderGeometry(0.018, 0.018, 0.22, 8);
        const barrelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
        const barrel = new THREE.Mesh(barrelGeo, barrelMat);
        barrel.rotation.x = Math.PI / 2;
        barrel.position.set(0, 0.01, -0.22);
        gunGroup.add(barrel);

        // mango
        const gripGeo = new THREE.BoxGeometry(0.055, 0.13, 0.09);
        const gripMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
        const grip = new THREE.Mesh(gripGeo, gripMat);
        grip.position.set(0, -0.115, 0.07);
        grip.rotation.x = 0.18;
        gunGroup.add(grip);

        // gatillo
        const triggerGeo = new THREE.BoxGeometry(0.012, 0.04, 0.02);
        const triggerMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const trigger = new THREE.Mesh(triggerGeo, triggerMat);
        trigger.position.set(0, -0.04, 0.01);
        gunGroup.add(trigger);

        // flash de boca del cañón (oculto por defecto)
        const flashGeo = new THREE.SphereGeometry(0.045, 6, 6);
        const flashMat = new THREE.MeshBasicMaterial({
          color: 0xffdd00,
          transparent: true,
          opacity: 0.9,
        });
        const flash = new THREE.Mesh(flashGeo, flashMat);
        flash.position.set(0, 0, -0.35);
        flash.visible = false;
        flash.isMuzzleFlash = true;
        gunGroup.add(flash);

        scene.add(gunGroup);
        return gunGroup;
      }

      // ================== CONTROLES Y EVENTOS ==================
      document.addEventListener("keydown", (e) => {
        keyStates[e.code] = true;
        if (e.code === "KeyK") damagePlayer(50);
      });
      document.addEventListener("keyup", (e) => (keyStates[e.code] = false));

      container.addEventListener("mousedown", (e) => {
        initAudio(); // activar AudioContext con gesto del usuario
        document.body.requestPointerLock();
        mouseTime = performance.now();
      });

      document.addEventListener("mouseup", (e) => {
        if (document.pointerLockElement === document.body) {
          shootRaycast(); // ✅ disparo en lugar de bola
        }
      });

      document.addEventListener("mousemove", (e) => {
        if (document.pointerLockElement === document.body) {
          camYaw -= e.movementX * 0.002;
          camPitch -= e.movementY * 0.002;
          camPitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, camPitch));
        }
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ================== FÍSICAS ==================
      function playerCollisions() {
        const result = worldOctree.capsuleIntersect(playerCollider);
        playerOnFloor = false;
        if (result) {
          playerOnFloor = result.normal.y > 0;
          if (!playerOnFloor) {
            playerVelocity.addScaledVector(
              result.normal,
              -result.normal.dot(playerVelocity),
            );
          }
          if (result.depth >= 1e-10) {
            playerCollider.translate(
              result.normal.multiplyScalar(result.depth),
            );
          }
        }
      }

      function updatePlayer(deltaTime) {
        let damping = Math.exp(-4 * deltaTime) - 1;
        if (!playerOnFloor) {
          playerVelocity.y -= GRAVITY * deltaTime;
          damping *= 0.1;
        } else {
          playerVelocity.y = Math.max(0, playerVelocity.y);
        }

        playerVelocity.addScaledVector(playerVelocity, damping);
        playerCollider.translate(
          playerVelocity.clone().multiplyScalar(deltaTime),
        );
        playerCollisions();

        // torso del jugador
        const torso = new THREE.Vector3()
          .addVectors(playerCollider.start, playerCollider.end)
          .multiplyScalar(0.5);

        // personaje rota con el yaw
        if (playerModel) {
          playerModel.position.copy(torso);
          playerModel.position.y -= 1;
          playerModel.rotation.y = camYaw + Math.PI;
        }

        // ================= ARMA — pegada al hombro derecho =================
        if (gunMesh) {
          // posición relativa al hombro del personaje
          const sinYaw = Math.sin(camYaw);
          const cosYaw = Math.cos(camYaw);

          // hombro derecho del personaje
          const shoulderOffset = new THREE.Vector3(
            cosYaw * 0.28 - sinYaw * 0.12, // derecha
            0.55, // altura del hombro
            sinYaw * 0.28 + cosYaw * 0.12, // adelante un poco
          );

          gunMesh.position.copy(torso).add(shoulderOffset);

          // la pistola apunta hacia donde mira la cámara
          const quatY = new THREE.Quaternion().setFromAxisAngle(
            new THREE.Vector3(0, 1, 0),
            camYaw,
          );
          const quatX = new THREE.Quaternion().setFromAxisAngle(
            new THREE.Vector3(1, 0, 0),
            camPitch,
          );
          gunMesh.quaternion.copy(quatY).multiply(quatX);
        }

        // ================= CÁMARA RE4 — hombro derecho ✅ =================
        const sinYaw = Math.sin(camYaw);
        const cosYaw = Math.cos(camYaw);

        const distBack = 2.5;
        const distRight = 0.6; // ✅ positivo = hombro derecho (corregido)
        const distUp = 1.4;

        // cámara detrás y a la DERECHA del jugador
        const camPos = new THREE.Vector3(
          torso.x + sinYaw * distBack + cosYaw * distRight, // ✅ corregido
          torso.y + distUp,
          torso.z + cosYaw * distBack - sinYaw * distRight, // ✅ corregido
        );

        camera.position.copy(camPos);

        // rotación de la cámara con quaternion (sin lookAt → sin giro infinito)
        const quatY = new THREE.Quaternion().setFromAxisAngle(
          new THREE.Vector3(0, 1, 0),
          camYaw,
        );
        const quatX = new THREE.Quaternion().setFromAxisAngle(
          new THREE.Vector3(1, 0, 0),
          camPitch,
        );
        camera.quaternion.copy(quatY).multiply(quatX);
      }

      function constrainPlayer() {
        if (!worldBounds) return;
        const padding = 0.2;
        const { min, max } = worldBounds;
        playerCollider.start.x = Math.max(
          min.x + padding,
          Math.min(max.x - padding, playerCollider.start.x),
        );
        playerCollider.start.z = Math.max(
          min.z + padding,
          Math.min(max.z - padding, playerCollider.start.z),
        );
        playerCollider.end.x = Math.max(
          min.x + padding,
          Math.min(max.x - padding, playerCollider.end.x),
        );
        playerCollider.end.z = Math.max(
          min.z + padding,
          Math.min(max.z - padding, playerCollider.end.z),
        );
        if (playerCollider.start.y < worldBounds.min.y) {
          playerCollider.start.y = worldBounds.min.y + 0.2;
          playerCollider.end.y = playerCollider.start.y + 1;
          playerVelocity.y = 0;
        }
      }

      function playerSphereCollision(sphere) {
        const center = vector1
          .addVectors(playerCollider.start, playerCollider.end)
          .multiplyScalar(0.5);
        const r = playerCollider.radius + sphere.collider.radius;
        const r2 = r * r;
        for (const point of [
          playerCollider.start,
          playerCollider.end,
          center,
        ]) {
          const d2 = point.distanceToSquared(sphere.collider.center);
          if (d2 < r2) {
            const normal = vector1
              .subVectors(point, sphere.collider.center)
              .normalize();
            const v1 = vector2
              .copy(normal)
              .multiplyScalar(normal.dot(playerVelocity));
            const v2 = vector3
              .copy(normal)
              .multiplyScalar(normal.dot(sphere.velocity));
            playerVelocity.add(v2).sub(v1);
            sphere.velocity.add(v1).sub(v2);
            sphere.collider.center.addScaledVector(
              normal,
              -(r - Math.sqrt(d2)) / 2,
            );
          }
        }
      }

      // ================== CONTROLES DE JUGADOR ==================
      function getForwardVector() {
        playerDirection.set(-Math.sin(camYaw), 0, -Math.cos(camYaw));
        return playerDirection;
      }

      function getSideVector() {
        playerDirection.set(Math.cos(camYaw), 0, -Math.sin(camYaw));
        return playerDirection;
      }

      function teleportPlayerIfOob() {
        if (camera.position.y < -10 && worldBounds) {
          const center = new THREE.Vector3();
          worldBounds.getCenter(center);
          playerCollider.start.set(
            center.x,
            worldBounds.min.y + 0.3,
            worldBounds.max.z + 2,
          );
          playerCollider.end.set(
            center.x,
            worldBounds.min.y + 0.8,
            worldBounds.max.z + 2,
          );
          playerVelocity.set(0, 0, 0);
        }
      }

      // ================== FUNCIONES DE UBICACIÓN ==================
      function addPosition(x, z) {
        usedPositions.push({ x, z });
      }

      function clampToBounds(x, z, margin = 2) {
        return {
          x: Math.max(
            worldBounds.min.x + margin,
            Math.min(worldBounds.max.x - margin, x),
          ),
          z: Math.max(
            worldBounds.min.z + margin,
            Math.min(worldBounds.max.z - margin, z),
          ),
        };
      }

      function isFarEnough(x, z, minDist = 12) {
        return usedPositions.every((p) => {
          const dx = p.x - x,
            dz = p.z - z;
          return dx * dx + dz * dz > minDist * minDist;
        });
      }

      function placeObject(object, x, z, scale = 1) {
        const pos = clampToBounds(x, z);
        object.scale.set(scale, scale, scale);
        object.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(object);
        object.position.set(pos.x, worldBounds.min.y - box.min.y - 0.05, pos.z);
        return pos;
      }

      // ================== CARGA DE MODELOS ==================
      const loader = new GLTFLoader().setPath("./models/gltf/");
      const loaderExtras = new GLTFLoader().setPath("./models/");

      loader.load(
        "abandoned_warehouse.glb",
        (gltf) => {
          const model = gltf.scene;
          scene.add(model);
          model.updateWorldMatrix(true, true);
          worldOctree.fromGraphNode(model);

          const box = new THREE.Box3().setFromObject(model);
          worldBounds = box;
          const center = new THREE.Vector3();
          box.getCenter(center);
          const size = new THREE.Vector3();
          box.getSize(size);

          const floor = new THREE.Mesh(
            new THREE.BoxGeometry(size.x, 0.2, size.z),
            new THREE.MeshBasicMaterial(),
          );
          floor.position.set(center.x, box.min.y + 0.1, center.z);
          scene.add(floor);
          floor.updateWorldMatrix(true, true);
          worldOctree.fromGraphNode(floor);
          scene.remove(floor);
          floor.geometry.dispose();
          floor.material.dispose();

          const angle = Math.random() * Math.PI * 2;
          const dist = 15 + Math.random() * 15;
          const spawn = {
            x: center.x + Math.cos(angle) * dist,
            z: center.z + Math.sin(angle) * dist,
          };
          playerCollider.start.set(spawn.x, box.min.y + 1, spawn.z);
          playerCollider.end.set(spawn.x, box.min.y + 2.5, spawn.z);

          const spread = 25;
          function getValidPosition(x, z, minDist = 12) {
            const offsets = [
              [0, 0],
              [5, 0],
              [-5, 0],
              [0, 5],
              [0, -5],
              [8, 8],
              [-8, -8],
            ];
            for (const [ox, oz] of offsets) {
              if (isFarEnough(x + ox, z + oz, minDist))
                return { x: x + ox, z: z + oz };
            }
            return { x, z };
          }

          loaderExtras.load("car_scene.glb", (g) => {
            const car = g.scene;
            const v = getValidPosition(
              center.x + spread * 0.8,
              center.z - spread * 0.6,
            );
            const p = placeObject(car, v.x, v.z, 0.02);
            addPosition(p.x, p.z);
            scene.add(car);
            worldOctree.fromGraphNode(car);
          });
          loaderExtras.load(
            "low_poly_car_-_chevrolet_c10_pickup_1963.glb",
            (g) => {
              const car2 = g.scene;
              const v = getValidPosition(
                center.x - spread * 0.5,
                center.z + spread * 0.3,
              );
              const p = placeObject(car2, v.x, v.z, 0.02);
              addPosition(p.x, p.z);
              scene.add(car2);
              worldOctree.fromGraphNode(car2);
            },
          );
          loaderExtras.load("worn_shed_pbr_game-ready.glb", (g) => {
            const shed = g.scene;
            const v = getValidPosition(
              center.x - spread * 1.3,
              center.z - spread * 0.5,
            );
            const p = placeObject(shed, v.x, v.z, 0.018);
            addPosition(p.x, p.z);
            scene.add(shed);
            worldOctree.fromGraphNode(shed);
          });
          loaderExtras.load("low_poly_rocks.glb", (g) => {
            const rock = g.scene;
            [
              [10, 10],
              [-10, 15],
              [15, -10],
              [-15, -5],
              [20, 0],
            ].forEach(([rx, rz]) => {
              const v = getValidPosition(center.x + rx, center.z + rz, 10);
              const r = rock.clone();
              const fp = placeObject(r, v.x, v.z, 4);
              addPosition(fp.x, fp.z);
              scene.add(r);
              worldOctree.fromGraphNode(r);
            });
          });
          loaderExtras.load("stylized_low_poly_tree_-_game-ready.glb", (g) => {
            const tree = g.scene;
            [
              [-20, -20],
              [20, -20],
              [-20, 20],
              [20, 20],
              [0, 25],
              [25, 0],
              [-25, 0],
            ].forEach(([tx, tz]) => {
              const v = getValidPosition(center.x + tx, center.z + tz, 15);
              const t = tree.clone();
              const fp = placeObject(t, v.x, v.z, 2.5);
              addPosition(fp.x, fp.z);
              scene.add(t);
              worldOctree.fromGraphNode(t);
            });
          });

          console.log("MODELO CARGADO ✅");
        },
        undefined,
        (e) => console.error("ERROR AL CARGAR EL MODELO", e),
      );

      // ================== PERSONAJE ==================
      let mixer;
      const actions = {};
      let activeAction;
      let playerModel;

      const playerLoader = new GLTFLoader().setPath("./models/player/");

      const ANIM_FILES = [
        { file: "walk_left.glb", name: "walk_left", loop: THREE.LoopRepeat },
        { file: "walk_right.glb", name: "walk_right", loop: THREE.LoopRepeat },
        { file: "pistol_run.glb", name: "run", loop: THREE.LoopRepeat },
        { file: "pistol_jump.glb", name: "jump", loop: THREE.LoopOnce },
        { file: "dying.glb", name: "dying", loop: THREE.LoopOnce },
        {
          file: "walking_backwards.glb",
          name: "walk_back",
          loop: THREE.LoopRepeat,
        },
      ];

      playerLoader.load("idle.glb", (gltf) => {
        playerModel = gltf.scene;
        playerModel.scale.set(1.5, 1.5, 1.5);
        scene.add(playerModel);

        mixer = new THREE.AnimationMixer(playerModel);
        const idleAction = mixer.clipAction(gltf.animations[0]);
        idleAction.setLoop(THREE.LoopRepeat, Infinity);
        actions["idle"] = idleAction;
        idleAction.play();
        activeAction = idleAction;
        console.log("✅ Animación cargada: idle");

        ANIM_FILES.forEach(({ file, name, loop }) =>
          loadAnimation(file, name, loop),
        );

        mixer.addEventListener("finished", () => {
          if (activeAction === actions["jump"]) switchAnimation("idle");
        });

        // crear arma una vez que el personaje existe
        gunMesh = createGun();
      });

      // ✅ FUNCIÓN INTOCABLE
      function loadAnimation(file, name, loopMode) {
        playerLoader.load(
          file,
          (gltf) => {
            let clip = gltf.animations[0];

            // =========================
            // 🔥 1. ELIMINAR ROOT MOTION
            // =========================
            clip.tracks = clip.tracks.filter((track) => {
              return !track.name.toLowerCase().includes("position");
            });

            const action = mixer.clipAction(clip);

            // =========================
            // 🔥 2. LOOP CONFIG
            // =========================
            action.setLoop(
              loopMode,
              loopMode === THREE.LoopOnce ? 1 : Infinity,
            );

            if (loopMode === THREE.LoopOnce) {
              action.clampWhenFinished = true;
            }

            // =========================
            // 🔥 3. VELOCIDAD POR ANIMACIÓN
            // =========================
            switch (name) {
              case "idle":
                action.timeScale = 5.0;
                break;
              case "run":
                action.timeScale = 5.0;
                break;
              case "walk_left":
                action.timeScale = 7.0;
                break;
              case "walk_right":
                action.timeScale = 7.0;
                break;
              case "walk_back":
                action.timeScale = 8.0;
                break;
              case "jump":
                action.timeScale = 5.0;
                break;
              case "dying":
                action.timeScale = 5.0;
                break;
              default:
                action.timeScale = 5.0;
            }

            // =========================
            // 🔥 4. EVITAR "REVERSE BUG"
            // =========================
            action.setEffectiveWeight(1);

            actions[name] = action;

            console.log(
              "✅ Animación cargada:",
              name,
              "| speed:",
              action.timeScale,
            );
          },
          undefined,
          () => console.warn("⚠️ No se pudo cargar:", file),
        );
      }

      function switchAnimation(name) {
        if (!actions[name]) return;
        if (activeAction === actions[name]) return;
        activeAction.fadeOut(0.2);
        actions[name].reset().fadeIn(0.2).play();
        activeAction = actions[name];
      }

      // ================== CONTROLES ==================
      function controls(deltaTime) {
        if (isDead) return;

        const speedDelta = deltaTime * (playerOnFloor ? 25 : 8);
        let moving = false;
        let animTarget = "idle";

        if (keyStates["KeyW"]) {
          playerVelocity.add(getForwardVector().multiplyScalar(speedDelta));
          animTarget = "run";
          moving = true;
        }
        if (keyStates["KeyS"]) {
          playerVelocity.add(getForwardVector().multiplyScalar(-speedDelta));
          if (!moving) animTarget = "walk_left";
          moving = true;
        }
        if (keyStates["KeyA"]) {
          playerVelocity.add(getSideVector().multiplyScalar(-speedDelta));
          if (!moving) animTarget = "walk_left";
          moving = true;
        }
        if (keyStates["KeyD"]) {
          playerVelocity.add(getSideVector().multiplyScalar(speedDelta));
          if (!moving) animTarget = "walk_right";
          moving = true;
        }
        if (
          playerOnFloor &&
          keyStates["Space"] &&
          activeAction !== actions["jump"]
        ) {
          playerVelocity.y = 15;
          animTarget = "jump";
          moving = true;
        }

        const isLocked =
          activeAction === actions["jump"] || activeAction === actions["dying"];
        if (!isLocked) switchAnimation(animTarget);
      }

      // ================== BUCLE DE ANIMACIÓN ==================
      function animate() {
        const now = performance.now() / 1000;
        const deltaTime =
          Math.min(0.05, now - (window.lastTime || now)) / STEPS_PER_FRAME;
        window.lastTime = now;

        if (mixer) mixer.update(deltaTime);

        for (let i = 0; i < STEPS_PER_FRAME; i++) {
          controls(deltaTime);
          updatePlayer(deltaTime);
          constrainPlayer();
          teleportPlayerIfOob();
        }

        updateBulletLines();

        renderer.render(scene, camera);
        stats.update();
      }

      renderer.setAnimationLoop(animate);
    </script>
