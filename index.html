<!doctype html>
<html lang="es">
  <head>
    <title>three.js - Octree Collisions (Warehouse)</title>
    <meta charset="utf-8" />
    <meta

    />
    <link type="text/css" rel="stylesheet" href="main.css" />
    <link

  <body>

    </nav>
    <div id="info">
      MOUSE para mirar • WASD para mover • SPACE para saltar • Click para lanzar
      bolas • K para dañarse
    </div>

    <!-- ================== HUD DE VIDA ================== -->
    <div
      id="hud"
      style="
        position: absolute;
        bottom: 30px;
        left: 30px;
        z-index: 999;
        font-family: monospace;
        color: white;
        text-shadow: 1px 1px 3px black;
      "
    >
      <div style="margin-bottom: 6px; font-size: 14px">❤️ VIDA</div>
      <div
        style="
          width: 200px;
          height: 18px;
          background: #333;
          border-radius: 4px;
          overflow: hidden;
          border: 1px solid #555;
        "
      >
        <div
          id="health-bar"
          style="
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #e53935, #ef9a9a);
            transition: width 0.3s ease;
            border-radius: 4px;
          "
        ></div>
      </div>
      <div id="health-text" style="font-size: 12px; margin-top: 4px">
        100 / 100
      </div>
    </div>

    <!-- ================== CROSSHAIR RE4 ================== -->
    <div
      id="crosshair"
      style="
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 999;
      "
    >
      <svg width="24" height="24" viewBox="0 0 24 24">
        <line
          x1="12"
          y1="2"
          x2="12"
          y2="8"
          stroke="white"
          stroke-width="1.5"
          opacity="0.9"
        />
        <line
          x1="12"
          y1="16"
          x2="12"
          y2="22"
          stroke="white"
          stroke-width="1.5"
          opacity="0.9"
        />
        <line
          x1="2"
          y1="12"
          x2="8"
          y2="12"
          stroke="white"
          stroke-width="1.5"
          opacity="0.9"
        />
        <line
          x1="16"
          y1="12"
          x2="22"
          y2="12"
          stroke="white"
          stroke-width="1.5"
          opacity="0.9"
        />
        <circle cx="12" cy="12" r="1.5" fill="red" opacity="0.9" />
      </svg>
    </div>

    <div id="container"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "./build/three.module.js",
          "three/addons/": "./jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import Stats from "three/addons/libs/stats.module.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { Octree } from "three/addons/math/Octree.js";
      import { OctreeHelper } from "three/addons/helpers/OctreeHelper.js";
      import { Capsule } from "three/addons/math/Capsule.js";

      // ================== CONFIGURACIÓN BASE ==================
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x88ccee);
      scene.fog = new THREE.Fog(0x88ccee, 0, 50);

      const camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.rotation.order = "YXZ";

      const fillLight1 = new THREE.HemisphereLight(0x8dc1de, 0x00668d, 1.5);
      fillLight1.position.set(2, 1, 1);
      scene.add(fillLight1);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 2.5);
      directionalLight.position.set(-5, 25, -1);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.width = 1024;
      directionalLight.shadow.mapSize.height = 1024;
      scene.add(directionalLight);

      const container = document.getElementById("container");
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.VSMShadowMap;
      container.appendChild(renderer.domElement);

      const stats = new Stats();
      stats.domElement.style.position = "absolute";
      stats.domElement.style.top = "0px";
      container.appendChild(stats.domElement);

      // ================== VARIABLES GLOBALES ==================
      const GRAVITY = 30;
      const NUM_SPHERES = 100;
      const SPHERE_RADIUS = 0.2;
      const STEPS_PER_FRAME = 5;

      let worldBounds = null;
      const worldOctree = new Octree();
      const usedPositions = [];

      const playerCollider = new Capsule(
        new THREE.Vector3(0, 0.5, 0),
        new THREE.Vector3(0, 3.5, 0),
        0.5,
      );

      const playerVelocity = new THREE.Vector3();
      const playerDirection = new THREE.Vector3();
      let playerOnFloor = false;
      let mouseTime = 0;

      const keyStates = {};
      const vector1 = new THREE.Vector3();
      const vector2 = new THREE.Vector3();
      const vector3 = new THREE.Vector3();

      // ================== CÁMARA RE4 — estado interno ==================
      // Ángulos de la cámara controlados por el mouse (independientes de camera.rotation)
      let camYaw = 0; // rotación horizontal
      let camPitch = 0; // rotación vertical

      // ================== SISTEMA DE VIDA ==================
      let playerHealth = 100;
      let isDead = false;

      const healthBar = document.getElementById("health-bar");
      const healthText = document.getElementById("health-text");

      function updateHealthUI() {
        const pct = Math.max(0, playerHealth);
        healthBar.style.width = pct + "%";
        healthText.textContent = pct + " / 100";
        if (pct > 50) {
          healthBar.style.background =
            "linear-gradient(90deg, #e53935, #ef9a9a)";
        } else if (pct > 25) {
          healthBar.style.background =
            "linear-gradient(90deg, #f57c00, #ffcc80)";
        } else {
          healthBar.style.background =
            "linear-gradient(90deg, #b71c1c, #e53935)";
        }
      }

      function damagePlayer(amount) {
        if (isDead) return;
        playerHealth = Math.max(0, playerHealth - amount);
        updateHealthUI();
        console.log("❤️ Vida:", playerHealth);
        if (playerHealth <= 0) die();
      }

      function die() {
        isDead = true;
        playerVelocity.set(0, 0, 0);
        switchAnimation("dying");
        console.log("💀 PLAYER DEAD");
        setTimeout(() => location.reload(), 3000);
      }

      // ================== CONTROLES Y EVENTOS ==================
      document.addEventListener("keydown", (e) => {
        keyStates[e.code] = true;
        if (e.code === "KeyK") damagePlayer(50);
      });
      document.addEventListener("keyup", (e) => (keyStates[e.code] = false));

      container.addEventListener("mousedown", () => {
        document.body.requestPointerLock();
        mouseTime = performance.now();
      });

      document.addEventListener("mouseup", () => {
        if (document.pointerLockElement) throwBall();
      });

      // ✅ RE4: el mouse acumula yaw/pitch en variables propias
      // No tocamos camera.rotation directamente aquí
      document.addEventListener("mousemove", (e) => {
        if (document.pointerLockElement === document.body) {
          camYaw -= e.movementX * 0.002;
          camPitch -= e.movementY * 0.002;
          // limitar pitch para no voltear
          camPitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, camPitch));
        }
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ================== ESFERAS ==================
      const sphereGeometry = new THREE.IcosahedronGeometry(SPHERE_RADIUS, 5);
      const sphereMaterial = new THREE.MeshLambertMaterial({ color: 0xdede8d });
      const spheres = [];
      let sphereIdx = 0;

      for (let i = 0; i < NUM_SPHERES; i++) {
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        sphere.castShadow = true;
        sphere.receiveShadow = true;
        scene.add(sphere);
        spheres.push({
          mesh: sphere,
          collider: new THREE.Sphere(
            new THREE.Vector3(0, -100, 0),
            SPHERE_RADIUS,
          ),
          velocity: new THREE.Vector3(),
        });
      }

      // ================== LÓGICA DE FÍSICAS ==================
      function throwBall() {
        const sphere = spheres[sphereIdx];
        camera.getWorldDirection(playerDirection);
        sphere.collider.center
          .copy(playerCollider.end)
          .addScaledVector(playerDirection, playerCollider.radius * 1.5);
        const impulse =
          15 + 30 * (1 - Math.exp((mouseTime - performance.now()) * 0.001));
        sphere.velocity
          .copy(playerDirection)
          .multiplyScalar(impulse)
          .addScaledVector(playerVelocity, 2);
        sphereIdx = (sphereIdx + 1) % spheres.length;
      }

      function playerCollisions() {
        const result = worldOctree.capsuleIntersect(playerCollider);
        playerOnFloor = false;
        if (result) {
          playerOnFloor = result.normal.y > 0;
          if (!playerOnFloor) {
            playerVelocity.addScaledVector(
              result.normal,
              -result.normal.dot(playerVelocity),
            );
          }
          if (result.depth >= 1e-10) {
            playerCollider.translate(
              result.normal.multiplyScalar(result.depth),
            );
          }
        }
      }

      function updatePlayer(deltaTime) {
        let damping = Math.exp(-4 * deltaTime) - 1;
        if (!playerOnFloor) {
          playerVelocity.y -= GRAVITY * deltaTime;
          damping *= 0.1;
        } else {
          playerVelocity.y = Math.max(0, playerVelocity.y);
        }

        playerVelocity.addScaledVector(playerVelocity, damping);
        playerCollider.translate(
          playerVelocity.clone().multiplyScalar(deltaTime),
        );
        playerCollisions();

        // ================= PERSONAJE rota con el yaw =================
        if (playerModel) {
          const center = new THREE.Vector3()
            .addVectors(playerCollider.start, playerCollider.end)
            .multiplyScalar(0.5);
          playerModel.position.copy(center);
          playerModel.position.y -= 1;
          // personaje siempre mira hacia donde apunta la cámara (yaw)
          playerModel.rotation.y = camYaw;
        }

        // ================= CÁMARA ESTILO RE4 =================
        // Punto de referencia: torso del jugador
        const torso = new THREE.Vector3()
          .addVectors(playerCollider.start, playerCollider.end)
          .multiplyScalar(0.5);

        // Dirección horizontal de la cámara basada en yaw
        const sinYaw = Math.sin(camYaw);
        const cosYaw = Math.cos(camYaw);

        // Vector "adelante" de la cámara (horizontal)
        const fwdX = -sinYaw;
        const fwdZ = -cosYaw;

        // Vector "derecha" de la cámara
        const rightX = cosYaw;
        const rightZ = -sinYaw;

        // Parámetros RE4 — hombro derecho
        const distBack = 2.5; // distancia detrás del jugador
        const distRight = 0.6; // offset al hombro derecho
        const distUp = 1.4; // altura del hombro

        // Posición base de la cámara (hombro derecho)
        const camPos = new THREE.Vector3(
          torso.x + fwdX * -distBack + rightX * distRight,
          torso.y + distUp,
          torso.z + fwdZ * -distBack + rightZ * distRight,
        );

        camera.position.copy(camPos);

        // ✅ Aplicar rotación con quaternion para evitar el giro infinito
        // Primero rotamos en Y (yaw), luego en X local (pitch)
        const quatY = new THREE.Quaternion().setFromAxisAngle(
          new THREE.Vector3(0, 1, 0),
          camYaw,
        );
        const quatX = new THREE.Quaternion().setFromAxisAngle(
          new THREE.Vector3(1, 0, 0),
          camPitch,
        );
        camera.quaternion.copy(quatY).multiply(quatX);
      }

      function constrainPlayer() {
        if (!worldBounds) return;
        const padding = 0.2;
        const min = worldBounds.min;
        const max = worldBounds.max;
        playerCollider.start.x = Math.max(
          min.x + padding,
          Math.min(max.x - padding, playerCollider.start.x),
        );
        playerCollider.start.z = Math.max(
          min.z + padding,
          Math.min(max.z - padding, playerCollider.start.z),
        );
        playerCollider.end.x = Math.max(
          min.x + padding,
          Math.min(max.x - padding, playerCollider.end.x),
        );
        playerCollider.end.z = Math.max(
          min.z + padding,
          Math.min(max.z - padding, playerCollider.end.z),
        );
        if (playerCollider.start.y < worldBounds.min.y) {
          playerCollider.start.y = worldBounds.min.y + 0.2;
          playerCollider.end.y = playerCollider.start.y + 1;
          playerVelocity.y = 0;
        }
      }

      function playerSphereCollision(sphere) {
        const center = vector1
          .addVectors(playerCollider.start, playerCollider.end)
          .multiplyScalar(0.5);
        const r = playerCollider.radius + sphere.collider.radius;
        const r2 = r * r;
        for (const point of [
          playerCollider.start,
          playerCollider.end,
          center,
        ]) {
          const d2 = point.distanceToSquared(sphere.collider.center);
          if (d2 < r2) {
            const normal = vector1
              .subVectors(point, sphere.collider.center)
              .normalize();
            const v1 = vector2
              .copy(normal)
              .multiplyScalar(normal.dot(playerVelocity));
            const v2 = vector3
              .copy(normal)
              .multiplyScalar(normal.dot(sphere.velocity));
            playerVelocity.add(v2).sub(v1);
            sphere.velocity.add(v1).sub(v2);
            const d = (r - Math.sqrt(d2)) / 2;
            sphere.collider.center.addScaledVector(normal, -d);
          }
        }
      }

      function spheresCollisions() {
        for (let i = 0; i < spheres.length; i++) {
          for (let j = i + 1; j < spheres.length; j++) {
            const s1 = spheres[i],
              s2 = spheres[j];
            const d2 = s1.collider.center.distanceToSquared(s2.collider.center);
            const r2 = (s1.collider.radius + s2.collider.radius) ** 2;
            if (d2 < r2) {
              const normal = vector1
                .subVectors(s1.collider.center, s2.collider.center)
                .normalize();
              const v1 = vector2
                .copy(normal)
                .multiplyScalar(normal.dot(s1.velocity));
              const v2 = vector3
                .copy(normal)
                .multiplyScalar(normal.dot(s2.velocity));
              s1.velocity.add(v2).sub(v1);
              s2.velocity.add(v1).sub(v2);
              const d =
                (s1.collider.radius + s2.collider.radius - Math.sqrt(d2)) / 2;
              s1.collider.center.addScaledVector(normal, d);
              s2.collider.center.addScaledVector(normal, -d);
            }
          }
        }
      }

      function updateSpheres(deltaTime) {
        spheres.forEach((sphere) => {
          sphere.collider.center.addScaledVector(sphere.velocity, deltaTime);
          const result = worldOctree.sphereIntersect(sphere.collider);
          if (result) {
            sphere.velocity.addScaledVector(
              result.normal,
              -result.normal.dot(sphere.velocity) * 1.5,
            );
            sphere.collider.center.add(
              result.normal.multiplyScalar(result.depth),
            );
          } else {
            sphere.velocity.y -= GRAVITY * deltaTime;
          }
          sphere.velocity.addScaledVector(
            sphere.velocity,
            Math.exp(-1.5 * deltaTime) - 1,
          );
          playerSphereCollision(sphere);
        });
        spheresCollisions();
        spheres.forEach((s) => s.mesh.position.copy(s.collider.center));
      }

      // ================== CONTROLES DE JUGADOR ==================
      // ✅ RE4: forward/side se calculan desde camYaw, no desde camera.rotation
      function getForwardVector() {
        playerDirection.set(-Math.sin(camYaw), 0, -Math.cos(camYaw));
        return playerDirection;
      }

      function getSideVector() {
        playerDirection.set(Math.cos(camYaw), 0, -Math.sin(camYaw));
        return playerDirection;
      }

      function teleportPlayerIfOob() {
        if (camera.position.y < -10 && worldBounds) {
          const center = new THREE.Vector3();
          worldBounds.getCenter(center);
          playerCollider.start.set(
            center.x,
            worldBounds.min.y + 0.3,
            worldBounds.max.z + 2,
          );
          playerCollider.end.set(
            center.x,
            worldBounds.min.y + 0.8,
            worldBounds.max.z + 2,
          );
          playerVelocity.set(0, 0, 0);
          camera.position.copy(playerCollider.end);
        }
      }

      // ================== FUNCIONES DE UBICACIÓN ==================
      function addPosition(x, z) {
        usedPositions.push({ x, z });
      }

      function clampToBounds(x, z, margin = 2) {
        return {
          x: Math.max(
            worldBounds.min.x + margin,
            Math.min(worldBounds.max.x - margin, x),
          ),
          z: Math.max(
            worldBounds.min.z + margin,
            Math.min(worldBounds.max.z - margin, z),
          ),
        };
      }

      function isFarEnough(x, z, minDist = 12) {
        return usedPositions.every((p) => {
          const dx = p.x - x,
            dz = p.z - z;
          return dx * dx + dz * dz > minDist * minDist;
        });
      }

      function placeObject(object, x, z, scale = 1) {
        const pos = clampToBounds(x, z);
        object.scale.set(scale, scale, scale);
        object.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(object);
        object.position.set(pos.x, worldBounds.min.y - box.min.y - 0.05, pos.z);
        return pos;
      }

      // ================== CARGA DE MODELOS ==================
      const loader = new GLTFLoader().setPath("./models/gltf/");
      const loaderExtras = new GLTFLoader().setPath("./models/");

      loader.load(
        "abandoned_warehouse.glb",
        (gltf) => {
          console.log("MODELO CARGADO ✅");
          const model = gltf.scene;
          model.position.set(0, 0, 0);
          model.scale.set(1, 1, 1);
          scene.add(model);
          model.updateWorldMatrix(true, true);
          worldOctree.fromGraphNode(model);

          const box = new THREE.Box3().setFromObject(model);
          worldBounds = box;
          const center = new THREE.Vector3();
          box.getCenter(center);
          const size = new THREE.Vector3();
          box.getSize(size);

          const floor = new THREE.Mesh(
            new THREE.BoxGeometry(size.x, 0.2, size.z),
            new THREE.MeshBasicMaterial(),
          );
          floor.position.set(center.x, box.min.y + 0.1, center.z);
          scene.add(floor);
          floor.updateWorldMatrix(true, true);
          worldOctree.fromGraphNode(floor);
          scene.remove(floor);
          floor.geometry.dispose();
          floor.material.dispose();

          function getSpawnPosition(
            center,
            minDistance = 10,
            maxDistance = 25,
          ) {
            const angle = Math.random() * Math.PI * 2;
            const distance =
              minDistance + Math.random() * (maxDistance - minDistance);
            return {
              x: center.x + Math.cos(angle) * distance,
              z: center.z + Math.sin(angle) * distance,
            };
          }

          const spawn = getSpawnPosition(center, 15, 30);
          playerCollider.start.set(spawn.x, box.min.y + 1, spawn.z);
          playerCollider.end.set(spawn.x, box.min.y + 2.5, spawn.z);
          camera.position.copy(playerCollider.end);

          const spread = 25;

          function getValidPosition(x, z, minDist = 12) {
            const offsets = [
              [0, 0],
              [5, 0],
              [-5, 0],
              [0, 5],
              [0, -5],
              [8, 8],
              [-8, -8],
            ];
            for (const [ox, oz] of offsets) {
              if (isFarEnough(x + ox, z + oz, minDist))
                return { x: x + ox, z: z + oz };
            }
            return { x, z };
          }

          loaderExtras.load("car_scene.glb", (g) => {
            const car = g.scene;
            const v = getValidPosition(
              center.x + spread * 0.8,
              center.z - spread * 0.6,
            );
            const p = placeObject(car, v.x, v.z, 0.02);
            addPosition(p.x, p.z);
            scene.add(car);
            worldOctree.fromGraphNode(car);
          });

          loaderExtras.load(
            "low_poly_car_-_chevrolet_c10_pickup_1963.glb",
            (g) => {
              const car2 = g.scene;
              const v = getValidPosition(
                center.x - spread * 0.5,
                center.z + spread * 0.3,
              );
              const p = placeObject(car2, v.x, v.z, 0.02);
              addPosition(p.x, p.z);
              scene.add(car2);
              worldOctree.fromGraphNode(car2);
            },
          );

          loaderExtras.load("worn_shed_pbr_game-ready.glb", (g) => {
            const shed = g.scene;
            const v = getValidPosition(
              center.x - spread * 1.3,
              center.z - spread * 0.5,
            );
            const p = placeObject(shed, v.x, v.z, 0.018);
            addPosition(p.x, p.z);
            scene.add(shed);
            worldOctree.fromGraphNode(shed);
          });

          loaderExtras.load("low_poly_rocks.glb", (g) => {
            const rock = g.scene;
            [
              [10, 10],
              [-10, 15],
              [15, -10],
              [-15, -5],
              [20, 0],
            ].forEach(([rx, rz]) => {
              const v = getValidPosition(center.x + rx, center.z + rz, 10);
              const r = rock.clone();
              const fp = placeObject(r, v.x, v.z, 4);
              addPosition(fp.x, fp.z);
              scene.add(r);
              worldOctree.fromGraphNode(r);
            });
          });

          loaderExtras.load("stylized_low_poly_tree_-_game-ready.glb", (g) => {
            const tree = g.scene;
            [
              [-20, -20],
              [20, -20],
              [-20, 20],
              [20, 20],
              [0, 25],
              [25, 0],
              [-25, 0],
            ].forEach(([tx, tz]) => {
              const v = getValidPosition(center.x + tx, center.z + tz, 15);
              const t = tree.clone();
              const fp = placeObject(t, v.x, v.z, 2.5);
              addPosition(fp.x, fp.z);
              scene.add(t);
              worldOctree.fromGraphNode(t);
            });
          });
        },
        undefined,
        (e) => console.error("ERROR AL CARGAR EL MODELO", e),
      );

      // ================== PERSONAJE ==================
      let mixer;
      const actions = {};
      let activeAction;
      let playerModel;

      const playerLoader = new GLTFLoader().setPath("./models/player/");

      const ANIM_FILES = [
        { file: "walk_left.glb", name: "walk_left", loop: THREE.LoopRepeat },
        { file: "walk_right.glb", name: "walk_right", loop: THREE.LoopRepeat },
        { file: "pistol_run.glb", name: "run", loop: THREE.LoopRepeat },
        { file: "pistol_jump.glb", name: "jump", loop: THREE.LoopOnce },
        { file: "dying.glb", name: "dying", loop: THREE.LoopOnce },
        {
          file: "walking_backwards.glb",
          name: "walk_back",
          loop: THREE.LoopRepeat,
        },
      ];

      playerLoader.load("idle.glb", (gltf) => {
        playerModel = gltf.scene;
        playerModel.scale.set(1.5, 1.5, 1.5);
        scene.add(playerModel);

        mixer = new THREE.AnimationMixer(playerModel);

        const idleAction = mixer.clipAction(gltf.animations[0]);
        idleAction.setLoop(THREE.LoopRepeat, Infinity);
        actions["idle"] = idleAction;
        idleAction.play();
        activeAction = idleAction;
        console.log("✅ Animación cargada: idle");

        ANIM_FILES.forEach(({ file, name, loop }) =>
          loadAnimation(file, name, loop),
        );

        mixer.addEventListener("finished", () => {
          if (activeAction === actions["jump"]) switchAnimation("idle");
        });
      });

      // ✅ FUNCIÓN INTOCABLE — exactamente como la pidió el usuario
      function loadAnimation(file, name, loopMode) {
        playerLoader.load(
          file,
          (gltf) => {
            let clip = gltf.animations[0];

            // =========================
            // 🔥 1. ELIMINAR ROOT MOTION
            // =========================
            clip.tracks = clip.tracks.filter((track) => {
              return !track.name.toLowerCase().includes("position");
            });

            const action = mixer.clipAction(clip);

            // =========================
            // 🔥 2. LOOP CONFIG
            // =========================
            action.setLoop(
              loopMode,
              loopMode === THREE.LoopOnce ? 1 : Infinity,
            );

            if (loopMode === THREE.LoopOnce) {
              action.clampWhenFinished = true;
            }

            // =========================
            // 🔥 3. VELOCIDAD POR ANIMACIÓN
            // =========================
            switch (name) {
              case "idle":
                action.timeScale = 5.0;
                break;

              case "run": // pistol run
                action.timeScale = 5.0;
                break;

              case "walk_left":
                action.timeScale = 7.0;
                break;

              case "walk_right":
                action.timeScale = 7.0;
                break;

              case "walk_back":
                action.timeScale = 8.0;
                break;

              case "jump":
                action.timeScale = 5.0;
                break;

              case "dying":
                action.timeScale = 5.0;
                break;

              default:
                action.timeScale = 5.0;
            }

            // =========================
            // 🔥 4. EVITAR "REVERSE BUG"
            // =========================
            action.setEffectiveWeight(1);

            actions[name] = action;

            console.log(
              "✅ Animación cargada:",
              name,
              "| speed:",
              action.timeScale,
            );
          },
          undefined,
          () => console.warn("⚠️ No se pudo cargar:", file),
        );
      }

      function switchAnimation(name) {
        if (!actions[name]) return;
        if (activeAction === actions[name]) return;
        activeAction.fadeOut(0.2);
        actions[name].reset().fadeIn(0.2).play();
        activeAction = actions[name];
      }

      // ================== CONTROLES ==================
      function controls(deltaTime) {
        if (isDead) return;

        const speedDelta = deltaTime * (playerOnFloor ? 25 : 8);
        let moving = false;
        let animTarget = "idle";

        if (keyStates["KeyW"]) {
          playerVelocity.add(getForwardVector().multiplyScalar(speedDelta));
          animTarget = "run";
          moving = true;
        }
        if (keyStates["KeyS"]) {
          playerVelocity.add(getForwardVector().multiplyScalar(-speedDelta));
          if (!moving) animTarget = "walk_left";
          moving = true;
        }
        if (keyStates["KeyA"]) {
          playerVelocity.add(getSideVector().multiplyScalar(-speedDelta));
          if (!moving) animTarget = "walk_left";
          moving = true;
        }
        if (keyStates["KeyD"]) {
          playerVelocity.add(getSideVector().multiplyScalar(speedDelta));
          if (!moving) animTarget = "walk_right";
          moving = true;
        }
        if (
          playerOnFloor &&
          keyStates["Space"] &&
          activeAction !== actions["jump"]
        ) {
          playerVelocity.y = 15;
          animTarget = "jump";
          moving = true;
        }

        const isLocked =
          activeAction === actions["jump"] || activeAction === actions["dying"];
        if (!isLocked) switchAnimation(animTarget);
      }

      // ================== BUCLE DE ANIMACIÓN ==================
      function animate() {
        const now = performance.now() / 1000;
        const deltaTime =
          Math.min(0.05, now - (window.lastTime || now)) / STEPS_PER_FRAME;
        window.lastTime = now;

        if (mixer) mixer.update(deltaTime);

        for (let i = 0; i < STEPS_PER_FRAME; i++) {
          controls(deltaTime);
          updatePlayer(deltaTime);
          constrainPlayer();
          updateSpheres(deltaTime);
          teleportPlayerIfOob();
        }

        renderer.render(scene, camera);
        stats.update();
      }

      renderer.setAnimationLoop(animate);
    </script>
